    <h1 id="titulo">Cadastro de Produção</h1>

    <form>
    <div class="input">
        <label for="producao">Produção do mês:</label>
      <input type="number" id="producao" required> 
    </div>

    <div class="input">
        <label for="data">Mês/Ano:</label>
      <input type="month" id="data" required> 
    </div>

    <div class="input">
        <label for="responsavel">Responsável</label>
      <input type="text" id="responsavel" required> 
    </div>

    <div class="input">
        <label for="setor">Setor</label>
        <input type="text" id="setor">
    </div>
    <button type="submit">Cadastrar</button>
    </form>
